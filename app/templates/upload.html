<!DOCTYPE html>
<html>

<head>
    <title>Upload File</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI';
        }

        body{
            display:flex;
            background:#eef2ff;
        }

        .sidebar{
            width:260px;
            height:100vh;
            background:white;
            padding:30px 25px;
            border-right:1px solid #e5e7eb;
            position:fixed;
            left:0;
            top:0;
        }

        .logo{
            font-size:28px;
            font-weight:700;
            margin-bottom:40px;
            color:#0f172a;
        }

        .menu{
            display:flex;
            flex-direction:column;
            gap:14px;
        }

        .menu a{
            text-decoration:none;
            color:#334155;
            font-size:15px;
            font-weight:500;
            padding:12px 16px;
            border-radius:12px;
            transition:0.2s;
        }

        .menu a:hover{
            background:#eef2ff;
            color:#2563eb;
        }

        .storage{
            margin-top:40px;
            background:#f8fafc;
            padding:18px;
            border-radius:18px;
            border:1px solid #dbeafe;
        }

        .storage h4{
            font-size:15px;
            margin-bottom:12px;
            color:#0f172a;
        }

        .bar{
            width:100%;
            height:10px;
            background:#dbeafe;
            border-radius:20px;
            overflow:hidden;
        }

        .fill{
            width:45%;
            height:100%;
            background:#60a5fa;
            border-radius:20px;
        }

        .storage p{
            margin-top:10px;
            font-size:13px;
            color:#64748b;
        }

        .main{
            margin-left:260px;
            width:100%;
            padding:40px;
        }

        .title{
            font-size:38px;
            font-weight:700;
            color:#0f172a;
            margin-bottom:10px;
        }

        .subtitle{
            color:#64748b;
            margin-bottom:35px;
            font-size:16px;
        }

        .upload-box{
            width:380px;
            background:white;
            padding:30px;
            border-radius:24px;
            box-shadow:0 4px 14px rgba(0,0,0,0.05);
        }

        .upload-area{
            border:2px dashed #bfdbfe;
            border-radius:18px;
            padding:50px 20px;
            text-align:center;
            margin-bottom:25px;
            cursor:pointer;
            transition:0.2s;
        }

        .upload-area:hover{
            background:#f8fbff;
        }

        .upload-icon{
            font-size:52px;
            margin-bottom:15px;
        }

        .upload-text{
            font-size:20px;
            font-weight:600;
            margin-bottom:8px;
            color:#0f172a;
        }

        .upload-sub{
            font-size:14px;
            color:#64748b;
        }

        input[type=file]{
            display:none;
        }

        .upload-btn{
            width:100%;
            border:none;
            padding:14px;
            border-radius:14px;
            background:#60a5fa;
            color:white;
            font-size:15px;
            font-weight:600;
            cursor:pointer;
            transition:0.2s;
        }

        .upload-btn:hover{
            background:#3b82f6;
        }

    </style>

</head>

<body>

    <div class="sidebar">

        <div class="logo">
            📁 Drive
        </div>

        <div class="menu">

            <a href="/upload/">➕ New Upload</a>

            <a href="/">📂 My Files</a>

            <a href="/shared/">👥 Shared Files</a>

            <a href="/starred/">⭐ Starred</a>

            <a href="/trash/">🗑️ Trash</a>

            <a href="/settings/">⚙️ Settings</a>

        </div>

        <div class="storage">

            <h4>Storage Used</h4>

            <div class="bar">
                <div class="fill"></div>
            </div>

            <p>45% of storage used</p>

        </div>

    </div>

    <div class="main">

        <div class="title">
            Upload File
        </div>

        <div class="subtitle">
            Store your files securely in Drive
        </div>

        <div class="upload-box">

            <form method="POST" enctype="multipart/form-data">

                {% csrf_token %}

                <label for="file-upload">

                    <div class="upload-area">

                        <div class="upload-icon">
                            📤
                        </div>

                        <div class="upload-text">
                            Click to select file
                        </div>

                        <div class="upload-sub" id="file-name">
                            No file selected
                        </div>

                    </div>

                </label>

                <input type="file"
                       name="file"
                       id="file-upload"
                       required
                       onchange="showFileName(this)">

                <button type="submit" class="upload-btn">
                    Upload File
                </button>

            </form>

        </div>

    </div>

    <script>

        function showFileName(input){

            if(input.files.length > 0){

                document.getElementById("file-name").innerText =
                    input.files[0].name;

            }
        }

    </script>

</body>

</html>
